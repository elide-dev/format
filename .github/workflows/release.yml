name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write
  packages: read

jobs:
  release:
    name: "Release"
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: "Setup: Checkout"
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: "Setup: Node"
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: "Setup: Bun"
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: "Setup: Cosign"
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: "Setup: Install Dependencies"
        run: bun install --frozen-lockfile

      - name: "Build: Bundle"
        run: bun run build

      - name: "Sentry: Upload Source Maps"
        if: env.SENTRY_AUTH_TOKEN != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: elide-dev
          SENTRY_PROJECT: format
        run: |
          npx @sentry/cli releases new "format@${GITHUB_REF_NAME#v}"
          npx @sentry/cli releases files "format@${GITHUB_REF_NAME#v}" upload-sourcemaps dist/ --ext js --ext map
          npx @sentry/cli releases finalize "format@${GITHUB_REF_NAME#v}"
          npx @sentry/cli releases deploys "format@${GITHUB_REF_NAME#v}" new -e production

      - name: "Build: Package Artifact"
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p artifacts
          tar -czf "artifacts/format-${TAG}.tar.gz" \
            action.yml \
            dist/index.js \
            dist/index.js.map \
            dist/post.js \
            dist/post.js.map \
            package.json \
            .github/LICENSE
          sha256sum "artifacts/format-${TAG}.tar.gz" > "artifacts/format-${TAG}.tar.gz.sha256"
          echo "ARTIFACT=artifacts/format-${TAG}.tar.gz" >> "$GITHUB_ENV"
          echo "ARTIFACT_SHA=artifacts/format-${TAG}.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: "SBOM: Generate"
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: artifacts/sbom.spdx.json

      - name: "Sign: Cosign"
        run: |
          cosign sign-blob \
            --yes \
            --bundle "artifacts/format-${GITHUB_REF_NAME}.tar.gz.cosign-bundle" \
            "$ARTIFACT"

      - name: "Attest: Build Provenance"
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ env.ARTIFACT }}

      - name: "Attest: SBOM"
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: ${{ env.ARTIFACT }}
          sbom-path: artifacts/sbom.spdx.json

      - name: "Release: Create"
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT_SHA }}
            artifacts/sbom.spdx.json
            artifacts/format-${{ github.ref_name }}.tar.gz.cosign-bundle

      - name: "Release: Update Major Tag"
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Extract major version: v4.1.0 -> v4
          MAJOR="${TAG%%.*}"
          if [[ "$MAJOR" =~ ^v[0-9]+$ ]]; then
            git tag -f "$MAJOR" "$TAG"
            git push -f origin "$MAJOR"
            echo "Updated major tag $MAJOR -> $TAG"
          fi
